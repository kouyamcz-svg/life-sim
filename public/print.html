<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ライフシミュレーション結果</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans JP',sans-serif;background:white;color:#1e293b;font-size:11px;padding:16px;max-width:600px;margin:0 auto}
    @media print{
      body{padding:6px;max-width:100%}
      .no-print{display:none!important}
      .page-break{page-break-before:always}
      *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
      @page{margin:8mm;size:A4}
    }
    .print-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:16px;font-family:'Noto Sans JP',sans-serif}
    .back-btn{display:block;width:100%;padding:10px;background:white;color:#64748b;border:2px solid #e2e8f0;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:16px;font-family:'Noto Sans JP',sans-serif;text-align:center;text-decoration:none}
    .header{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:white;padding:14px 16px;border-radius:10px;margin-bottom:14px}
    .header h1{font-size:17px;font-weight:800}
    .header .sub{font-size:8px;opacity:0.7;letter-spacing:2px;margin-bottom:3px}
    .section{margin-bottom:14px}
    .section-title{font-size:11px;font-weight:800;color:#475569;border-bottom:2px solid #e2e8f0;padding-bottom:3px;margin-bottom:8px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
    .card{border-radius:8px;padding:10px;text-align:center}
    .card .lbl{font-size:8px;color:#64748b;margin-bottom:3px}
    .card .val{font-size:15px;font-weight:800}
    .bar-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
    .bar-lbl{font-size:9px;color:#64748b;width:28px;flex-shrink:0}
    .bar-track{flex:1;background:#e2e8f0;border-radius:3px;height:11px}
    .bar-fill{height:11px;border-radius:3px}
    .bar-val{font-size:9px;font-weight:700;width:52px;text-align:right;flex-shrink:0}
    table{width:100%;border-collapse:collapse}
    td{padding:4px 6px;font-size:9px;border-bottom:1px solid #f1f5f9}
    td:first-child{color:#64748b;width:40%}
    td:last-child{font-weight:700}
    .comment{border-radius:8px;padding:10px;font-size:10px;line-height:1.7;margin-bottom:10px}
    .footer{font-size:8px;color:#94a3b8;border-top:1px solid #e2e8f0;padding-top:6px;display:flex;justify-content:space-between;margin-top:10px}
    .risk-box{border-radius:8px;padding:10px;margin-bottom:10px}
    svg text{font-family:'Noto Sans JP',sans-serif}
    #loading{text-align:center;padding:40px;font-size:16px;color:#64748b}
    #content{display:none}
  </style>
</head>
<body>
  <div id="loading">データを読み込み中...</div>
  <div id="content">
    <button class="print-btn no-print" onclick="window.print()">🖨️ PDFとして保存</button>
    <a class="back-btn no-print" onclick="history.back()">← ツールに戻る</a>
    <div id="report"></div>
  </div>
  <script>
    function formatMan(v) {
      if (Math.abs(v) >= 10000) return (v/10000).toFixed(0) + '億円';
      return v.toFixed(0) + '万円';
    }

    window.onload = function() {
      try {
        const raw = localStorage.getItem('lifesim_data');
        if (!raw) { document.getElementById('loading').textContent = 'データが見つかりません。ツールに戻って再度お試しください。'; return; }
        const d = JSON.parse(raw);
        renderReport(d);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch(e) {
        document.getElementById('loading').textContent = 'エラー: ' + e.message;
      }
    };

    function renderReport(d) {
      const { summary, chartData, age, hasSpouse, spouseType, nenkinStartAge,
              income, bonus, spouseIncome, spouseBonus, living, loanAmount, loanYears, loanRate,
              savings, retirement, spouseRetirement, children, inflationRate,
              disabledAge, hasDansin, disShort, disYrs, disTotal, izokuM, deathShort, deathYrs, deathTotal } = d;

      const totalNenkin = Math.round(((summary.adjMyNenkin||0) + (hasSpouse?(summary.adjSpNenkin||0):0))*10)/10;
      const intervals = chartData.filter((_,i,a) => { const idx = a.findIndex(x=>x.age===_. age); return (_. age - age) % 10 === 0; });
      const maxVal = Math.max(...intervals.map(x=>Math.abs(x.asset)), 1);
      const monthlyLoan = d.monthlyLoan;

      document.getElementById('report').innerHTML = `
        <div class="header">
          <div class="sub">ResOne × ライフプランニング</div>
          <h1>住宅購入ライフシミュレーション結果</h1>
          <div style="font-size:9px;opacity:0.8;margin-top:2px">作成日：${new Date().toLocaleDateString('ja-JP')}</div>
        </div>

        <div class="section">
          <div class="section-title">📊 試算サマリー</div>
          <div class="grid2" style="margin-bottom:10px">
            <div class="card" style="background:${summary.finalAsset>0?'#eff6ff':'#fef2f2'}">
              <div class="lbl">90歳時点の資産</div>
              <div class="val" style="color:${summary.finalAsset>0?'#2563eb':'#dc2626'}">${formatMan(summary.finalAsset)}</div>
            </div>
            <div class="card" style="background:#f0fdf4">
              <div class="lbl">ピーク資産</div>
              <div class="val" style="color:#10b981">${formatMan(summary.peakAsset)}</div>
            </div>
            <div class="card" style="background:#fffbeb">
              <div class="lbl">月々のローン返済</div>
              <div class="val" style="color:#f59e0b">${monthlyLoan.toFixed(1)}万円</div>
            </div>
            <div class="card" style="background:${summary.negativeAge?'#fef2f2':'#f0fdf4'}">
              <div class="lbl">資産マイナス転落</div>
              <div class="val" style="color:${summary.negativeAge?'#dc2626':'#16a34a'}">${summary.negativeAge?summary.negativeAge+'歳〜':'なし ✓'}</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">🏛️ 年金受給額（試算）　${nenkinStartAge}歳から受給</div>
          <div class="${hasSpouse?'grid3':'grid2'}">
            <div class="card" style="background:#f0f9ff"><div class="lbl">ご自身</div><div class="val" style="color:#0369a1;font-size:13px">${summary.adjMyNenkin}万円/年</div></div>
            ${hasSpouse?`<div class="card" style="background:#f0f9ff"><div class="lbl">配偶者（${spouseType}）</div><div class="val" style="color:#0369a1;font-size:13px">${summary.adjSpNenkin}万円/年</div></div>`:''}
            <div class="card" style="background:#eff6ff"><div class="lbl">世帯合計</div><div class="val" style="color:#2563eb;font-size:13px">${totalNenkin}万円/年</div></div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">📈 資産推移（10年刻み）</div>
          ${intervals.map(x=>{
            const w=Math.round(Math.abs(x.asset)/maxVal*100);
            const isPos=x.asset>=0;
            return `<div class="bar-row">
              <div class="bar-lbl">${x.age}歳</div>
              <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${isPos?'#2563eb':'#dc2626'}"></div></div>
              <div class="bar-val" style="color:${isPos?'#2563eb':'#dc2626'}">${formatMan(x.asset)}</div>
            </div>`;
          }).join('')}
        </div>

        <div class="section">
          <div class="section-title">📋 入力条件</div>
          <table>
            <tr><td>年齢 / 定年</td><td>${age}歳 / ${d.retireAge}歳</td></tr>
            <tr><td>月収（手取り）</td><td>${income}万円 ＋ボーナス${bonus}万円/年</td></tr>
            ${hasSpouse?`<tr><td>配偶者収入</td><td>${spouseIncome}万円 ＋ボーナス${spouseBonus}万円/年（${spouseType}）</td></tr>`:''}
            <tr><td>住宅ローン</td><td>${loanAmount}万円 / ${loanYears}年 / 金利${loanRate}%</td></tr>
            <tr><td>現在の貯蓄 / 退職金</td><td>${savings}万円 / ${retirement+(hasSpouse?spouseRetirement:0)}万円</td></tr>
            <tr><td>子ども / 年金受給開始</td><td>${children}人 / ${nenkinStartAge}歳</td></tr>
            <tr><td>インフレ率</td><td>${inflationRate}%/年</td></tr>
          </table>
        </div>

        <div class="comment" style="background:${summary.finalAsset>0?'#eff6ff':'#fef2f2'};color:${summary.finalAsset>0?'#1e40af':'#991b1b'}">
          ${summary.finalAsset>0
            ?`✅ このプランでは老後まで資産がプラスを維持できる見込みです。月々${monthlyLoan.toFixed(1)}万円の返済も現在の収支から無理なく対応できます。`
            :`⚠️ ${summary.negativeAge}歳頃に資産がマイナスになる可能性があります。保険や貯蓄の見直しで対策できます。`}
        </div>

        <div class="page-break"></div>

        <div class="section" style="margin-top:14px">
          <div class="section-title">🛡️ 必要保障額の目安</div>

          <div class="risk-box" style="background:#fffbeb;border:1px solid #fde68a;margin-bottom:10px">
            <div style="font-size:11px;font-weight:800;color:#92400e;margin-bottom:8px">🏥 就業不能・収入保障保険（${disabledAge}歳で就業不能の場合）</div>
            <div class="grid3" style="margin-bottom:8px">
              <div class="card" style="background:white"><div class="lbl">必要月額給付</div><div class="val" style="color:#dc2626;font-size:13px">${disShort>0?disShort+'万円':'不要'}</div></div>
              <div class="card" style="background:white"><div class="lbl">補填期間</div><div class="val" style="color:#f59e0b;font-size:13px">${disYrs}年間</div></div>
              <div class="card" style="background:white"><div class="lbl">総不足額</div><div class="val" style="color:#1e293b;font-size:13px">${disTotal>0?'約'+formatMan(disTotal):'-'}</div></div>
            </div>
            <div style="font-size:8px;color:#92400e">※障害年金（収入の約30%）を考慮済み</div>
          </div>

          <div class="risk-box" style="background:#fff1f2;border:1px solid #fda4af">
            <div style="font-size:11px;font-weight:800;color:#9f1239;margin-bottom:8px">💐 死亡保険・収入保障保険（団信${hasDansin?'あり':'なし'}）</div>
            <div class="grid3" style="margin-bottom:8px">
              <div class="card" style="background:white"><div class="lbl">遺族年金（月）</div><div class="val" style="color:#9f1239;font-size:13px">${izokuM}万円</div></div>
              <div class="card" style="background:white"><div class="lbl">月間不足額</div><div class="val" style="color:${deathShort>0?'#dc2626':'#16a34a'};font-size:13px">${deathShort>0?'-'+deathShort+'万円':'不足なし'}</div></div>
              <div class="card" style="background:white"><div class="lbl">総不足額</div><div class="val" style="color:#1e293b;font-size:13px">${deathShort>0?'約'+formatMan(Math.round(deathShort*12*deathYrs)):'-'}</div></div>
            </div>
            <div style="font-size:8px;color:#9f1239">※${hasDansin?'団信によりローン残債は免除。':'団信なしのためローン返済継続。'}遺族厚生年金＋${children>0?'遺族基礎年金':'中高齢寡婦加算'}を考慮。</div>
          </div>
        </div>

        <div class="footer">
          <span>※本シミュレーションは概算です。実際のプランニングはFPや専門家にご相談ください。</span>
          <span>ResOne Life Simulator</span>
        </div>
      `;
    }
  </script>
</body>
</html>
